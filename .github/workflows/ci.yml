name: CI

on:
  pull_request:
  push:
    branches:
      - staging
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SSH_HOST: 72.60.22.40
  SSH_PORT: 65002
  SSH_USER: u993999906
  SUPPORT_APP_PATH: /home/u993999906/domains/support.midiawork.com/public_html
  SUPPORT_RESTART_FILE: /home/u993999906/domains/support.midiawork.com/nodejs/tmp/restart.txt
  STAGING_API_APP_PATH: /home/u993999906/domains/midiawork.com/public_html/staging-api
  SUPPORT_PUBLIC_API_URL: https://staging-api.midiawork.com/api
  HOSTINGER_NODE_BIN: /opt/alt/alt-nodejs22/root/usr/bin/node
  HOSTINGER_NPM_BIN: /opt/alt/alt-nodejs22/root/usr/bin/npm

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Astro checks
        run: npm run check

      - name: Run frontend tests
        run: npm run test

      - name: Build Astro app
        run: npm run build

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, openssl, tokenizer, xml

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Prepare Laravel environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force
        working-directory: backend

      - name: Run Laravel tests
        run: composer test
        working-directory: backend

  deploy-backend:
    name: Deploy Backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync backend files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='public/storage' \
            backend/ "$SSH_USER@$SSH_HOST:$STAGING_API_APP_PATH/"

      - name: Run backend deployment commands
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$STAGING_API_APP_PATH'
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          "

  deploy-frontend:
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - deploy-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync frontend files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.env' \
            --exclude='.htaccess' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='backend' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.astro' \
            --exclude='coverage' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='.builds' \
            --exclude='tmp' \
            --exclude='stderr.log' \
            --exclude='default.php' \
            --exclude='*.zip' \
            ./ "$SSH_USER@$SSH_HOST:$SUPPORT_APP_PATH/"

      - name: Build frontend on server and restart Node app
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            export PATH=\$(dirname '$HOSTINGER_NODE_BIN'):\$PATH
            cd '$SUPPORT_APP_PATH'
            export PUBLIC_API_URL='$SUPPORT_PUBLIC_API_URL'
            '$HOSTINGER_NODE_BIN' -v
            '$HOSTINGER_NPM_BIN' ci
            '$HOSTINGER_NPM_BIN' run build
            touch '$SUPPORT_RESTART_FILE'
          "
