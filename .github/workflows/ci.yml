name: CI

on:
  pull_request:
  push:
    branches:
      - staging
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SSH_HOST: 72.60.22.40
  SSH_PORT: 65002
  SSH_USER: u993999906
  SUPPORT_APP_PATH: /home/u993999906/domains/support.midiawork.com/public_html
  SUPPORT_RESTART_FILE: /home/u993999906/domains/support.midiawork.com/public_html/tmp/restart.txt
  STAGING_API_APP_PATH: /home/u993999906/domains/midiawork.com/public_html/staging-api
  SUPPORT_PUBLIC_API_URL: https://staging-api.midiawork.com/api
  SUPPORT_PUBLIC_STRIPE_KEY: pk_test_51T7y9WAiRuCNaQmFx2ilGjkkLbvMavgDJ5Bu49PV2iQcNlpYIsE9Y2xkVfXryFr5KXDNm55Hj7ReSlx7hhptKFJL00ljg2mUfC
  HOSTINGER_NODE_BIN: /opt/alt/alt-nodejs20/root/usr/bin/node
  HOSTINGER_NPM_BIN: /opt/alt/alt-nodejs20/root/usr/bin/npm

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Astro checks
        run: npm run check

      - name: Run frontend tests
        run: npm run test

      - name: Build Astro app
        env:
          PUBLIC_API_URL: ${{ env.SUPPORT_PUBLIC_API_URL }}
          PUBLIC_STRIPE_KEY: ${{ env.SUPPORT_PUBLIC_STRIPE_KEY }}
          NODE_ENV: production
        run: |
          rm -rf .astro node_modules/.vite dist
          npm run build

      - name: Copy server CSS into client assets
        run: |
          echo "=== Server _astro CSS files ==="
          ls -la dist/server/_astro/*.css 2>/dev/null || echo "(none)"
          echo "=== Client _astro CSS files (before copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"
          if ls dist/server/_astro/*.css >/dev/null 2>&1; then
            cp dist/server/_astro/*.css dist/client/_astro/
            echo "=== Copied server CSS to client ==="
          fi
          echo "=== Client _astro CSS files (after copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"

      - name: Validate admin CSS bundle
        run: |
          CSS_FILE=$(ls dist/client/_astro/_path_*.css 2>/dev/null | head -1)
          if [ -z "$CSS_FILE" ]; then
            echo "::error::Admin CSS file (_path_*.css) NOT FOUND in dist/client/_astro/"
            exit 1
          fi
          CSS_SIZE=$(wc -c < "$CSS_FILE" | tr -d ' ')
          echo "Admin CSS file: $CSS_FILE"
          echo "Admin CSS size: $CSS_SIZE bytes"
          # Admin CSS must be at least 100KB (full bundle is ~130KB; broken is ~75KB)
          if [ "$CSS_SIZE" -lt 100000 ]; then
            echo "::error::Admin CSS is only $CSS_SIZE bytes (expected >= 100000). Tailwind likely purged admin classes."
            exit 1
          fi
          # Verify key admin classes are present
          for CLASS in "text-muted-foreground" "bg-sidebar" "rounded-md" "border-border"; do
            if ! grep -q "$CLASS" "$CSS_FILE"; then
              echo "::error::Admin CSS missing class: $CLASS"
              exit 1
            fi
          done
          echo "Admin CSS validation passed ($CSS_SIZE bytes, all key classes present)"

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, openssl, tokenizer, xml

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Prepare Laravel environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force
        working-directory: backend

      - name: Run Laravel tests
        run: composer test
        working-directory: backend

  deploy-backend:
    name: Deploy Backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync backend files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='public/storage' \
            backend/ "$SSH_USER@$SSH_HOST:$STAGING_API_APP_PATH/"

      - name: Run backend deployment commands
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$STAGING_API_APP_PATH'
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          "

  deploy-frontend:
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - deploy-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync frontend runtime files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            package.json package-lock.json server.mjs \
            "$SSH_USER@$SSH_HOST:$SUPPORT_APP_PATH/"

      - name: Sync built frontend dist
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$SUPPORT_APP_PATH/dist/"

      - name: Install runtime dependencies and restart Node app
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            export PATH=\$(dirname '$HOSTINGER_NODE_BIN'):\$PATH
            cd '$SUPPORT_APP_PATH'
            export PUBLIC_API_URL='$SUPPORT_PUBLIC_API_URL'
            export PUBLIC_STRIPE_KEY='$SUPPORT_PUBLIC_STRIPE_KEY'
            export ASTRO_NODE_AUTOSTART='disabled'
            export NODE_ENV='production'
            '$HOSTINGER_NODE_BIN' -v
            '$HOSTINGER_NPM_BIN' ci --omit=dev
            touch '$SUPPORT_RESTART_FILE'
          "

      - name: Verify admin CSS on server
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            CSS_FILE=\$(ls '$SUPPORT_APP_PATH'/dist/client/_astro/_path_*.css 2>/dev/null | head -1)
            if [ -z \"\$CSS_FILE\" ]; then
              echo 'FATAL: Admin CSS not found on server after deploy!'
              exit 1
            fi
            CSS_SIZE=\$(wc -c < \"\$CSS_FILE\" | tr -d ' ')
            echo \"Server admin CSS: \$CSS_FILE (\$CSS_SIZE bytes)\"
            if [ \"\$CSS_SIZE\" -lt 100000 ]; then
              echo 'FATAL: Admin CSS on server is too small — Tailwind classes were purged!'
              exit 1
            fi
            echo 'Server admin CSS verification passed.'
          "
