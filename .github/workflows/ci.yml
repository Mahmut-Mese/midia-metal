name: CI

on:
  pull_request:
  push:
    branches:
      - staging
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SSH_HOST: 72.60.22.40
  SSH_PORT: 65002
  SSH_USER: u993999906
  SUPPORT_APP_PATH: /home/u993999906/domains/support.midiawork.com/public_html
  SUPPORT_RESTART_FILE: /home/u993999906/domains/support.midiawork.com/public_html/tmp/restart.txt
  STAGING_API_APP_PATH: /home/u993999906/domains/midiawork.com/public_html/staging-api
  SUPPORT_PUBLIC_API_URL: https://staging-api.midiawork.com/api
  SUPPORT_PUBLIC_STRIPE_KEY: pk_test_51T7y9WAiRuCNaQmFx2ilGjkkLbvMavgDJ5Bu49PV2iQcNlpYIsE9Y2xkVfXryFr5KXDNm55Hj7ReSlx7hhptKFJL00ljg2mUfC
  HOSTINGER_NODE_BIN: /opt/alt/alt-nodejs20/root/usr/bin/node
  HOSTINGER_NPM_BIN: /opt/alt/alt-nodejs20/root/usr/bin/npm

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Astro checks
        run: npm run check

      - name: Run frontend tests
        run: npm run test

      - name: Build Astro app
        env:
          PUBLIC_API_URL: ${{ env.SUPPORT_PUBLIC_API_URL }}
          PUBLIC_STRIPE_KEY: ${{ env.SUPPORT_PUBLIC_STRIPE_KEY }}
          NODE_ENV: production
        run: |
          rm -rf .astro node_modules/.vite dist
          npm run build

      - name: Copy server CSS into client assets
        run: |
          echo "=== Server _astro CSS files ==="
          ls -la dist/server/_astro/*.css 2>/dev/null || echo "(none)"
          echo "=== Client _astro CSS files (before copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"
          if ls dist/server/_astro/*.css >/dev/null 2>&1; then
            cp dist/server/_astro/*.css dist/client/_astro/
            echo "=== Copied server CSS to client ==="
          fi
          echo "=== Client _astro CSS files (after copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"

      - name: Validate admin CSS bundle
        run: |
          CSS_FILE=$(ls dist/client/_astro/_path_*.css 2>/dev/null | head -1)
          if [ -z "$CSS_FILE" ]; then
            echo "::error::Admin CSS file (_path_*.css) NOT FOUND in dist/client/_astro/"
            exit 1
          fi
          CSS_SIZE=$(wc -c < "$CSS_FILE" | tr -d ' ')
          echo "Admin CSS file: $CSS_FILE"
          echo "Admin CSS size: $CSS_SIZE bytes"
          # Admin CSS must be at least 100KB (full bundle is ~130KB; broken is ~75KB)
          if [ "$CSS_SIZE" -lt 100000 ]; then
            echo "::error::Admin CSS is only $CSS_SIZE bytes (expected >= 100000). Tailwind likely purged admin classes."
            exit 1
          fi
          # Verify key admin classes are present
          for CLASS in "text-muted-foreground" "bg-sidebar" "rounded-md" "border-border"; do
            if ! grep -q "$CLASS" "$CSS_FILE"; then
              echo "::error::Admin CSS missing class: $CLASS"
              exit 1
            fi
          done
          echo "Admin CSS validation passed ($CSS_SIZE bytes, all key classes present)"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, openssl, tokenizer, xml

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Prepare Laravel environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force
        working-directory: backend

      - name: Check code formatting (Pint)
        run: ./vendor/bin/pint --test
        working-directory: backend

      - name: Run Laravel tests
        run: composer test
        working-directory: backend

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, openssl, tokenizer, xml

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --force
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          touch database/database.sqlite
          php artisan migrate:fresh --seed --force
          php artisan cache:clear
          php artisan serve --host=127.0.0.1 --port=8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1 && break
            sleep 1
          done
        working-directory: backend

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list
        env:
          PUBLIC_API_URL: http://127.0.0.1:8000/api
          PUBLIC_STRIPE_KEY: ${{ env.SUPPORT_PUBLIC_STRIPE_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            /tmp/midia-astro-playwright.log
          retention-days: 7

  deploy-backend:
    name: Deploy Backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test
      - e2e-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          for attempt in 1 2 3; do
            if ssh-keyscan -T 5 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to fetch SSH host key from $SSH_HOST:$SSH_PORT"
              exit 1
            fi
            sleep 5
          done

      - name: Sync backend files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='public/storage' \
            backend/ "$SSH_USER@$SSH_HOST:$STAGING_API_APP_PATH/"

      - name: Run backend deployment commands
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$STAGING_API_APP_PATH'
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          "

  deploy-frontend:
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - deploy-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Astro app
        env:
          PUBLIC_API_URL: ${{ env.SUPPORT_PUBLIC_API_URL }}
          PUBLIC_STRIPE_KEY: ${{ env.SUPPORT_PUBLIC_STRIPE_KEY }}
          NODE_ENV: production
        run: |
          rm -rf .astro node_modules/.vite dist
          npm run build

      - name: Copy server CSS into client assets
        run: |
          echo "=== Server _astro CSS files ==="
          ls -la dist/server/_astro/*.css 2>/dev/null || echo "(none)"
          echo "=== Client _astro CSS files (before copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"
          if ls dist/server/_astro/*.css >/dev/null 2>&1; then
            cp dist/server/_astro/*.css dist/client/_astro/
            echo "=== Copied server CSS to client ==="
          fi
          echo "=== Client _astro CSS files (after copy) ==="
          ls -la dist/client/_astro/*.css 2>/dev/null || echo "(none)"

      - name: Validate admin CSS bundle
        run: |
          CSS_FILE=$(ls dist/client/_astro/_path_*.css 2>/dev/null | head -1)
          if [ -z "$CSS_FILE" ]; then
            echo "::error::Admin CSS file (_path_*.css) NOT FOUND in dist/client/_astro/"
            exit 1
          fi
          CSS_SIZE=$(wc -c < "$CSS_FILE" | tr -d ' ')
          echo "Admin CSS file: $CSS_FILE"
          echo "Admin CSS size: $CSS_SIZE bytes"
          if [ "$CSS_SIZE" -lt 100000 ]; then
            echo "::error::Admin CSS is only $CSS_SIZE bytes (expected >= 100000). Tailwind likely purged admin classes."
            exit 1
          fi
          for CLASS in "text-muted-foreground" "bg-sidebar" "rounded-md" "border-border"; do
            if ! grep -q "$CLASS" "$CSS_FILE"; then
              echo "::error::Admin CSS missing class: $CLASS"
              exit 1
            fi
          done
          echo "Admin CSS validation passed ($CSS_SIZE bytes, all key classes present)"

      - name: Validate prerendered content pages
        env:
          API_BASE: ${{ env.SUPPORT_PUBLIC_API_URL }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const checks = [
            {
              name: 'services',
              api: `${process.env.API_BASE}/v1/services`,
              html: path.join('dist', 'client', 'services', 'index.html'),
              emptyText: 'No services available.',
            },
            {
              name: 'blog',
              api: `${process.env.API_BASE}/v1/blog`,
              html: path.join('dist', 'client', 'blog', 'index.html'),
              emptyText: 'No blog posts found.',
            },
            {
              name: 'portfolio',
              api: `${process.env.API_BASE}/v1/portfolio`,
              html: path.join('dist', 'client', 'portfolio', 'index.html'),
              emptyText: 'No projects found.',
            },
          ];

          const countItems = (data) => Array.isArray(data) ? data.length : Array.isArray(data?.data) ? data.data.length : 0;

          (async () => {
            for (const check of checks) {
              const response = await fetch(check.api, { headers: { Accept: 'application/json' } });
              if (!response.ok) {
                throw new Error(`${check.name} API check failed with status ${response.status}`);
              }

              const payload = await response.json();
              const itemCount = countItems(payload);
              if (!fs.existsSync(check.html)) {
                throw new Error(`Missing prerendered file: ${check.html}`);
              }

              const html = fs.readFileSync(check.html, 'utf8');
              const containsEmptyState = html.includes(check.emptyText);
              if (itemCount > 0 && containsEmptyState) {
                throw new Error(`${check.name} prerendered page contains its empty state while the API returned ${itemCount} items`);
              }

              console.log(`${check.name}: apiItems=${itemCount}, emptyState=${containsEmptyState}`);
            }
          })().catch((error) => {
            console.error(`::error::${error.message}`);
            process.exit(1);
          });
          EOF

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          for attempt in 1 2 3; do
            if ssh-keyscan -T 5 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to fetch SSH host key from $SSH_HOST:$SSH_PORT"
              exit 1
            fi
            sleep 5
          done

      - name: Sync frontend runtime files
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            package.json package-lock.json server.mjs \
            "$SSH_USER@$SSH_HOST:$SUPPORT_APP_PATH/"

      - name: Sync built frontend dist
        run: |
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$SUPPORT_APP_PATH/dist/"

      - name: Install runtime dependencies and restart Node app
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            export PATH=\$(dirname '$HOSTINGER_NODE_BIN'):\$PATH
            cd '$SUPPORT_APP_PATH'

            # Write .env so the Node process reads it on restart via server.mjs
            # (env vars exported in this SSH session are NOT inherited by the
            # process manager when it later restarts the app via restart.txt)
            printf 'PUBLIC_API_URL=%s\nPUBLIC_STRIPE_KEY=%s\nNODE_ENV=production\n' \
              '$SUPPORT_PUBLIC_API_URL' \
              '$SUPPORT_PUBLIC_STRIPE_KEY' \
              > '$SUPPORT_APP_PATH/.env'

            export PUBLIC_API_URL='$SUPPORT_PUBLIC_API_URL'
            export PUBLIC_STRIPE_KEY='$SUPPORT_PUBLIC_STRIPE_KEY'
            export ASTRO_NODE_AUTOSTART='disabled'
            export NODE_ENV='production'
            '$HOSTINGER_NODE_BIN' -v
            '$HOSTINGER_NPM_BIN' ci --omit=dev
            touch '$SUPPORT_RESTART_FILE'
          "

      - name: Verify admin CSS on server
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            CSS_FILE=\$(ls '$SUPPORT_APP_PATH'/dist/client/_astro/_path_*.css 2>/dev/null | head -1)
            if [ -z \"\$CSS_FILE\" ]; then
              echo 'FATAL: Admin CSS not found on server after deploy!'
              exit 1
            fi
            CSS_SIZE=\$(wc -c < \"\$CSS_FILE\" | tr -d ' ')
            echo \"Server admin CSS: \$CSS_FILE (\$CSS_SIZE bytes)\"
            if [ \"\$CSS_SIZE\" -lt 100000 ]; then
              echo 'FATAL: Admin CSS on server is too small — Tailwind classes were purged!'
              exit 1
            fi
            echo 'Server admin CSS verification passed.'
          "

      - name: Verify no production URLs in API responses
        run: |
          echo "=== Checking API responses for production host references ==="
          PROD_HOST="lightblue-albatross-164447.hostingersite.com"
          FAIL=0

          # Check products endpoint
          PRODUCTS=$(curl -sf 'https://staging-api.midiawork.com/api/v1/products' || echo "FETCH_FAILED")
          if [ "$PRODUCTS" = "FETCH_FAILED" ]; then
            echo "::error::Failed to fetch products API"
            FAIL=1
          elif echo "$PRODUCTS" | grep -q "$PROD_HOST"; then
            echo "::error::Products API response contains production host: $PROD_HOST"
            echo "$PRODUCTS" | grep -o "\"[^\"]*${PROD_HOST}[^\"]*\"" | head -5
            FAIL=1
          else
            echo "Products API: OK (no production URLs)"
          fi

          # Check product-categories endpoint
          CATEGORIES=$(curl -sf 'https://staging-api.midiawork.com/api/v1/product-categories' || echo "FETCH_FAILED")
          if [ "$CATEGORIES" = "FETCH_FAILED" ]; then
            echo "::error::Failed to fetch categories API"
            FAIL=1
          elif echo "$CATEGORIES" | grep -q "$PROD_HOST"; then
            echo "::error::Categories API response contains production host: $PROD_HOST"
            echo "$CATEGORIES" | grep -o "\"[^\"]*${PROD_HOST}[^\"]*\"" | head -5
            FAIL=1
          else
            echo "Categories API: OK (no production URLs)"
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::STAGING ISOLATION FAILED — production URLs detected in API responses!"
            exit 1
          fi
          echo "=== Staging isolation verified: 0 production URLs ==="

      - name: Verify staging media files are accessible
        run: |
          echo "=== Checking that staging media files return HTTP 200 ==="
          FAIL=0
          CHECKED=0
          MISSING=0

          # Extract image URLs from products API
          PRODUCTS=$(curl -sf 'https://staging-api.midiawork.com/api/v1/products' || echo "[]")
          MEDIA_URLS=$(echo "$PRODUCTS" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              items = data.get('data', data) if isinstance(data, dict) else data
              if not isinstance(items, list): items = [items]
              urls = set()
              for item in items:
                  img = item.get('image', '') or ''
                  if img.startswith('http'): urls.add(img)
                  for g in (item.get('gallery') or []):
                      if isinstance(g, str) and g.startswith('http'): urls.add(g)
              for u in sorted(urls): print(u)
          except: pass
          " 2>/dev/null)

          # Extract image URLs from categories API
          CATEGORIES=$(curl -sf 'https://staging-api.midiawork.com/api/v1/product-categories' || echo "[]")
          CAT_URLS=$(echo "$CATEGORIES" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              items = data.get('data', data) if isinstance(data, dict) else data
              if not isinstance(items, list): items = [items]
              urls = set()
              for item in items:
                  img = item.get('image', '') or ''
                  if img.startswith('http'): urls.add(img)
              for u in sorted(urls): print(u)
          except: pass
          " 2>/dev/null)

          ALL_URLS=$(echo -e "${MEDIA_URLS}\n${CAT_URLS}" | sort -u | grep -v '^$')

          if [ -z "$ALL_URLS" ]; then
            echo "No media URLs found in API responses (this may indicate an API issue)"
            exit 0
          fi

          while IFS= read -r url; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$url" || echo "000")
            CHECKED=$((CHECKED + 1))
            if [ "$STATUS" != "200" ]; then
              echo "::warning::Media file returned HTTP $STATUS: $url"
              MISSING=$((MISSING + 1))
            fi
          done <<< "$ALL_URLS"

          echo "Checked $CHECKED media URLs: $((CHECKED - MISSING)) OK, $MISSING failed"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::Some staging media files are not accessible (non-blocking)"
          fi
          echo "=== Media accessibility check complete ==="
